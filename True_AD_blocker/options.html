<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>True AD Blocker Settings</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg-dark: #020617;
            --card-bg: rgba(15, 23, 42, 0.6);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --danger: #ef4444;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        .dashboard {
            width: 100%;
            max-width: 800px;
            padding: 60px 20px;
        }

        header {
            margin-bottom: 48px;
            text-align: center;
        }

        .logo-main {
            font-size: 36px;
            font-weight: 900;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            display: block;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 32px;
            margin-bottom: 24px;
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .card-title {
            font-size: 20px;
            font-weight: 700;
        }

        .card-desc {
            color: var(--text-dim);
            font-size: 15px;
            line-height: 1.6;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 32px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #334155;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 24px; width: 24px; left: 4px; bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--primary);
        }

        input:checked + .slider:before {
            transform: translateX(28px);
        }

        .input-group {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        input[type="text"] {
            flex: 1;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 16px;
            color: white;
            font-size: 15px;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 12px 24px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        .block-list {
            margin-top: 24px;
            list-style: none;
            padding: 0;
        }

        .block-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 8px;
        }

        .block-item .domain {
            font-family: monospace;
            font-size: 14px;
        }

        .remove-btn {
            background: transparent;
            color: var(--text-dim);
            padding: 6px 12px;
            font-size: 13px;
        }

        .remove-btn:hover {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            transform: none;
        }

        footer {
            margin-top: 60px;
            text-align: center;
            color: var(--text-dim);
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <header>
            <span class="logo-main">True AD Blocker</span>
            <div style="color:var(--text-dim)">Simple, High-Performance Protection</div>
        </header>

        <div class="card">
            <div class="card-header">
                <div class="card-title">Main Protection</div>
                <label class="switch">
                    <input type="checkbox" id="main-toggle" checked>
                    <span class="slider"></span>
                </label>
            </div>
            <div class="card-desc">Enable or disable all ad blocking and tracker protection.</div>
        </div>

        <div class="card">
            <div class="card-title">Custom Block List</div>
            <div class="card-desc">Add specific websites you want to block entirely.</div>
            
            <div class="input-group">
                <input type="text" id="domain-input" placeholder="e.g., example.com">
                <button id="add-btn">Block Site</button>
            </div>

            <ul class="block-list" id="block-list">
                <!-- Blocked sites will appear here -->
            </ul>
        </div>

        <footer>
            True AD Blocker &copy; 2026. Optimized for speed and privacy.
        </footer>
    </div>
    <script src="options.js"></script>
</body>
</html>
