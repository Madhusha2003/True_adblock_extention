<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdBlocker Dashboard</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg-dark: #020617;
            --card-bg: rgba(15, 23, 42, 0.6);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        .dashboard {
            width: 100%;
            max-width: 1000px;
            padding: 60px 20px;
        }

        header {
            margin-bottom: 48px;
            text-align: center;
        }

        .logo-main {
            font-size: 32px;
            font-weight: 900;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            display: block;
        }

        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 32px;
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .card-title {
            font-size: 18px;
            font-weight: 700;
        }

        .card-desc {
            color: var(--text-dim);
            font-size: 14px;
            line-height: 1.6;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 52px;
            height: 28px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #334155;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 20px; width: 20px; left: 4px; bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--primary);
        }

        input:checked + .slider:before {
            transform: translateX(24px);
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <header>
            <span class="logo-main">True AD blocker</span>
            <div style="color:var(--text-dim)">Advanced Rule-Based Protection Interface</div>
        </header>

        <div class="settings-grid">
            <div class="card">
                <div class="card-header">
                    <div class="card-title">Rule Mode</div>
                    <label class="switch">
                        <input type="checkbox" id="rule-mode" checked>
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="card-desc">Industry-standard network filtering (DNR). Blocks trackers and scripts.</div>
            </div>

            <div class="card">
                <div class="card-header">
                    <div class="card-title">Experimental Features</div>
                    <label class="switch">
                        <input type="checkbox" id="experimental-features">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="card-desc">Deep-DOM ad removal and shadow-DOM cleaning.</div>
            </div>
        </div>
        <div style="margin-top: 60px; text-align: center; color: var(--text-dim); font-size: 13px;">
            True AD blocker Engine V5.1 &copy; 2026. Optimized for Performance & Privacy.
        </div>
    </div>
    <script src="options.js"></script>
</body>
</html>
