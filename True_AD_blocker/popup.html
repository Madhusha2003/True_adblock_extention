<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>True AI Ad Blocker</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-dark: #0f172a;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --glass: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            width: 320px;
            margin: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
        }

        .container {
            padding: 20px;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .logo {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            transition: transform 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-2px);
        }

        .stat-value {
            font-size: 24px;
            font-weight: 800;
            color: #818cf8;
            display: block;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .whitelist-section {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
            display: block;
        }

        .input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        input {
            flex: 1;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 8px 12px;
            color: white;
            font-size: 13px;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: var(--primary-hover);
        }

        .whitelist-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 120px;
            overflow-y: auto;
        }

        .whitelist-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
        }

        .whitelist-item:last-child {
            border-bottom: none;
        }

        .remove-btn {
            color: #ef4444;
            background: none;
            padding: 4px 8px;
            font-size: 11px;
        }

        .remove-btn:hover {
            background: rgba(239, 68, 68, 0.1);
        }

        footer {
            margin-top: 24px;
            text-align: center;
            font-size: 11px;
            color: var(--text-dim);
        }

        .status-badge {
            padding: 4px 8px;
            border-radius: 20px;
            background: rgba(34, 197, 94, 0.1);
            color: #22c55e;
            font-size: 10px;
            font-weight: 700;
        }
        .toggle-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #334155;
            transition: .4s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--primary);
        }

        input:checked + .slider:before {
            transform: translateX(20px);
        }

        .btn-primary {
            width: 100%;
            background: linear-gradient(to right, #6366f1, #8b5cf6);
            margin-bottom: 16px;
            padding: 12px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <span class="logo">True AD blocker</span>
            <span class="status-badge" id="status-text">PROTECTED</span>
        </header>

        <div class="toggle-section">
            <span class="section-title" style="margin:0">Protection System</span>
            <label class="switch">
                <input type="checkbox" id="main-toggle" checked>
                <span class="slider"></span>
            </label>
        </div>

        <button id="whitelist-site-btn" class="btn-primary">Whitelist This Site</button>

        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-value" id="blocked-count">0</span>
                <span class="stat-label">Total Blocked</span>
            </div>
        </div>

        <div class="whitelist-section">
            <span class="section-title">Manual Domains</span>
            <div class="input-group">
                <input type="text" id="domain-input" placeholder="example.com">
                <button id="add-btn">Add</button>
            </div>
            <ul class="whitelist-list" id="whitelist-items">
                <!-- Items will be injected here -->
            </ul>
        </div>

        <footer>
            True AD blocker Engine V5.1
        </footer>
    </div>
    <script src="popup.js"></script>
</body>
</html>
